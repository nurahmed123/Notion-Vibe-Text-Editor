<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Vibe Text Editor - Vanilla Test</title>
  <link rel="stylesheet" href="./dist/style.css">
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fafafa; }
    #editor-root { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 500px; max-width: 800px; margin: 0 auto; border: 1px solid #eaeaea; }
  </style>
</head>
<body>
  <h1 style="text-align: center;">Vanilla JavaScript Integration</h1>
  <div id="editor-root"></div>

  <!-- Note: in a real environment this would be imported via module or unpkg wrapper. For now we use the ESM build -->
  <script type="module">
    import { createNotionEditor } from './dist/notion-vibe-text-editor.es.js';

    window.editorInstance = createNotionEditor('editor-root', {
      initialContent: "",
      onChange: (content) => {
        console.log("Content updated:", JSON.parse(content));
      },
      uploadUrl: "https://httpbin.org/post",
      aiStreamUrl: "/api/ai"
    });
  </script>
</body>
</html>
